<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F0F4FF] font-sans">
    <div class="flex flex-col md:flex-row h-screen">
        <div class="md:w-1/2 bg-[#5E7AC4] text-white flex flex-col justify-center items-center p-12 text-center">
            <h1 class="text-5xl font-bold mb-6">Hello Prospective Students</h1>
            <div class="w-64 h-64 bg-white/20 rounded-lg flex items-center justify-center mb-6">
                <img src="UTS/gambar_login page.png" alt="Ilustrasi Belajar" class="w-4/5">
            </div>
            <p class="text-lg max-w-md">Unlock your professional potential. Learn from industry leaders and stay ahead of the competition.</p>
        </div>

        <div class="md:w-1/2 flex justify-center items-center p-6">
            <div class="bg-white p-10 rounded-2xl shadow-xl w-full max-w-md">
                <h2 class="text-2xl font-bold text-center text-gray-800">LOGIN PAGE</h2>
                <p class="text-sm text-center text-gray-500 mb-8">Masukkan Username dan Password Anda</p>
                
                <form id="loginForm" class="space-y-4">
                    <div>
                        <input type="email" id="email" placeholder="Email Addres" 
                               class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3852B4]">
                        <p id="emailError" class="text-red-500 text-xs mt-1 hidden"></p>
                    </div>
                    <div>
                        <input type="password" id="password" placeholder="Password" 
                               class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#3852B4]">
                        <p id="passError" class="text-red-500 text-xs mt-1 hidden"></p>
                    </div>
                    
                    <button type="submit" class="w-full bg-[#3852B4] text-white py-3 rounded-lg font-semibold hover:bg-blue-800 transition">
                        Login
                    </button>
                </form>

                <div class="relative my-6 text-center">
                    <span class="bg-white px-2 text-gray-400 text-sm relative z-10">Or Login With</span>
                    <div class="absolute top-1/2 w-full h-px bg-gray-200"></div>
                </div>

                <button class="w-full border border-gray-300 py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
                    <span class="text-sm font-medium">Sign in with Account Google</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email');
            const password = document.getElementById('password');
            let isValid = true;

            if (!email.value.includes('@')) {
                document.getElementById('emailError').innerText = "Email tidak valid";
                document.getElementById('emailError').classList.remove('hidden');
                isValid = false;
            }
            if (password.value.length < 6) {
                document.getElementById('passError').innerText = "Password minimal 6 karakter";
                document.getElementById('passError').classList.remove('hidden');
                isValid = false;
            }

            if (isValid) {
                window.location.href = "4.html";
            }
        });
    </script>
</body>
</html>
