<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="src/input.css">
    <link rel="stylesheet" href="src/output.css">
</head>

<body>
    <section class="min-h-screen flex">
        <div class="hidden lg:flex lg:w-1/2 bg-[#5E7AC4] items-center justify-center p-12">
            <div class="max-w-md text-white">
                <h1 class="text-5xl font-bold leading-tight mb-6">Hello Prospective Students</h1>
                <img src="src/img/gambar_login page.png" class="mb-6">
                <p class="text-lg font-semibold text-gray-100">Unlock your professional potential. Learn from industry
                    leaders and stay ahead of the competition.</p>
            </div>
        </div>
        <div class="w-full lg:w-1/2 bg-[#EBF1FF] flex items-center justify-center p-6">
            <div class="w-full max-w-md p-8">
                <h2 class="text-xl font-bold text-center text-gray-800 mb-2">LOGIN PAGE</h2>
                <p class="text-sm text-gray-500 text-center mb-6">Masukkan Username dan Password Anda</p>
                <form id="loginForm">
                    <input id="email" type="email" placeholder="Email Address"
                        class="w-full  p-3 rounded-md bg-white border border-gray-300 focus:outline-none focus:ring-2 text-[#5E7AC4] text-center focus:ring-[#5E7AC4]">
                    <p id="emailError" class="text-red-500 text-sm mb-3"></p>
                    <input id="password" type="password" placeholder="Password"
                        class="w-full p-3 rounded-md bg-white border border-gray-300 focus:outline-none focus:ring-2 text-[#5E7AC4] text-center focus:ring-[#5E7AC4]">
                    <p id="passwordError" class="text-red-500 text-sm mb-3"></p>
                    <button type="submit"
                        class="w-full bg-[#3852B4] text-white p-3 rounded-md font-semibold hover:opacity-80 mb-5">Login</button>
                </form>

                <div class="flex items-center gap-3 mb-5">
                    <hr class="flex-1 border-gray-300">
                    <span class="text-sm text-gray-500">Or Login With</span>
                    <hr class="flex-1 border-gray-300">
                </div>
                <a href="#"
                    class="flex items-center justify-center gap-3 border bg-white border-gray-300 rounded-md hover:opacity-80">
                    <img src="src/img/icon_google.svg" width="50">
                    <p class="text-sm font-medium text-gray-700">Sign in with Account Google</p>
                </a>
            </div>
        </div>
    </section>
    <script>
        const form = document.getElementById("loginForm");
        const email = document.getElementById("email");
        const password = document.getElementById("password");

        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            ((emailError.textContent = ""), (passwordError.textContent = ""));

            let valid = true;

            if (email.value === "") {
                emailError.textContent = "*Email harus diisi!";
                valid = false;
            }

            if (password.value === "") {
                passwordError.textContent = "*Password harus diisi!";
                valid = false;
            }

            if (valid) {
                alert("Selamat Datang, " + email.value);
            }
        });

    </script>
</body>

</html>
