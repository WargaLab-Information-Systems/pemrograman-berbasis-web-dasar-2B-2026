<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Online Course Education</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
          colors: {
            primary: { DEFAULT: '#5e7ac4', dark: '#2a47c0' },
            accent:  { DEFAULT: '#f59f00', dark: '#e08e00' },
            hero:    '#eef1fb',
          }
        }
      }
    }
  </script>
</head>
<body class="font-sans bg-hero min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-4xl bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col lg:flex-row min-h-[520px]">

    <div class="flex-1 bg-primary p-10 flex flex-col justify-center gap-6">
      <h2 class="text-white text-3xl font-extrabold leading-snug">
        Hello Prospective<br>Students
      </h2>
      <div class="w-full h-48 flex items-center justify-center">
        <span class="text-white/50 text-sm"><img src="gambar_login page.png" alt=""></span>
      </div>
      <p class="text-white/100 text-sm leading-relaxed font-semibold">
        Unlock your professional potential. Learn from <br>industry leaders and stay ahead of <br>the competition.
      </p>
    </div>

    <div class="flex-1 bg-hero p-10 flex flex-col justify-center gap-5">
      <div class="text-center mb-2">
        <p class="text-gray-900 font-bold text-base tracking-widest uppercase">Login Page</p>
        <p class="text-gray-400 text-xs mt-1">Masukkan Username dan Password Anda</p>
      </div>

      <div id="errorMsg" class="hidden bg-red-50 border border-red-300 text-red-600 text-xs rounded-lg px-4 py-2 text-center">
        Email atau password salah. Silakan coba lagi.
      </div>

      <input
        id="emailInput"
        type="email"
        placeholder="Email Address"
        class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-white text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition"
      />
      <input
        id="passwordInput"
        type="password"
        placeholder="Password"
        class="w-full px-4 py-3 rounded-lg border border-gray-200 bg-white text-sm text-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/40 focus:border-primary transition"
      />
      <button onclick="handleLogin()" class="w-full bg-primary hover:bg-primary-dark text-white font-bold text-sm py-3 rounded-lg transition">
        Login
      </button>

      <div class="flex items-center gap-3">
        <div class="flex-1 h-px bg-gray-200"></div>
        <span class="text-xs text-gray-400 whitespace-nowrap">Or Login With</span>
        <div class="flex-1 h-px bg-gray-200"></div>
      </div>

      <button class="w-full flex items-center justify-center gap-3 bg-white border border-gray-200 hover:border-primary text-gray-700 text-sm font-semibold py-3 rounded-lg transition">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Account Google
      </button>

      <p class="text-center text-xs text-gray-400 mt-2">
        Belum punya akun?
        <a href="#" class="text-primary font-semibold hover:underline">Daftar Sekarang</a>
      </p>
      <p class="text-center text-xs text-gray-400">
        <a href="index.html" class="text-primary font-semibold hover:underline">
          <i class="fa fa-arrow-left text-xs mr-1"></i> Kembali ke Beranda
        </a>
      </p>
    </div>

  </div>

  <script>
    const validUsers = [
      { email: "irwansyahrohmad@gmail.com", password: "wann2508" },
      { email: "student@example.com", password: "student123" },
    ];
    
    const redirectTo = "index.html"

    function handleLogin() {
      const email    = document.getElementById("emailInput").value.trim();
      const password = document.getElementById("passwordInput").value;
      const errorMsg = document.getElementById("errorMsg");

      const isValid = validUsers.some(
        user => user.email === email && user.password === password
      );

      if (isValid) {
        errorMsg.classList.add("hidden");
        sessionStorage.setItem("loggedIn", "true");
        sessionStorage.setItem("userEmail", email);
        window.location.href = redirectTo;
      } else {
        errorMsg.classList.remove("hidden");
        document.getElementById("passwordInput").value = "";
        document.getElementById("passwordInput").focus();
      }
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") handleLogin();
    });
  </script>

</body>
</html>
