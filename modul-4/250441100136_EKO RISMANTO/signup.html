<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BzMe</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    <nav class="flex px-10 py-6 justify-between items-center bg-white sticky top-0 z-50 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-orange-500 rounded-full"></div>
            <h1 class="text-2xl font-bold text-purple-600">BzMe</h1>
        </div>
        <a href="modul4-soal2.html" class="text-orange-500 font-semibold hover:text-orange-600 transition">Back to Home</a>
    </nav>

    <main class="px-6 md:px-10 py-12">
        <section class="max-w-3xl mx-auto bg-white border border-gray-100 rounded-3xl shadow-lg p-8 md:p-10">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold">Sign Up Form</h2>
                <p class="text-gray-500 mt-2">Lengkapi data di bawah untuk membuat akun baru.</p>
            </div>

            <form id="signupForm" class="grid grid-cols-1 md:grid-cols-2 gap-5" novalidate>
                <div class="md:col-span-2">
                    <label for="fullName" class="block text-sm font-semibold mb-2">Full Name</label>
                    <input id="fullName" name="fullName" type="text" required minlength="3" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label for="email" class="block text-sm font-semibold mb-2">Email</label>
                    <input id="email" name="email" type="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-semibold mb-2">Phone Number</label>
                    <input id="phone" name="phone" type="tel" required pattern="^[0-9+\-\s]{8,15}$" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label for="password" class="block text-sm font-semibold mb-2">Password</label>
                    <input id="password" name="password" type="password" required minlength="8" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-semibold mb-2">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required minlength="8" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-400">
                </div>

                <div class="md:col-span-2 flex items-start gap-3">
                    <input id="terms" name="terms" type="checkbox" class="mt-1 h-4 w-4 accent-orange-500" required>
                    <label for="terms" class="text-sm text-gray-600">Saya setuju dengan syarat dan ketentuan yang berlaku.</label>
                </div>

                <div class="md:col-span-2">
                    <p id="signupMessage" class="hidden mb-4 rounded-lg px-4 py-3 text-sm"></p>
                </div>

                <div class="md:col-span-2 flex flex-col sm:flex-row gap-4 sm:items-center sm:justify-between">
                    <p class="text-xs text-gray-500">Validasi otomatis akan menolak data yang belum lengkap atau tidak sesuai format.</p>
                    <button type="submit" class="bg-orange-500 text-white px-8 py-3 rounded-lg font-bold shadow-lg hover:bg-orange-600 transition">Create Account</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        const signupForm = document.getElementById('signupForm');
        const signupMessage = document.getElementById('signupMessage');

        function showMessage(text, type) {
            signupMessage.textContent = text;
            signupMessage.className = 'mb-4 rounded-lg px-4 py-3 text-sm';

            if (type === 'success') {
                signupMessage.classList.add('bg-green-100', 'text-green-700', 'border', 'border-green-200');
            } else {
                signupMessage.classList.add('bg-red-100', 'text-red-700', 'border', 'border-red-200');
            }

            signupMessage.classList.remove('hidden');
        }

        signupForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const fullName = document.getElementById('fullName');
            const email = document.getElementById('email');
            const phone = document.getElementById('phone');
            const password = document.getElementById('password');
            const confirmPassword = document.getElementById('confirmPassword');
            const terms = document.getElementById('terms');

            if (!fullName.value.trim()) {
                showMessage('Nama lengkap wajib diisi.', 'error');
                fullName.focus();
                return;
            }

            if (fullName.value.trim().length < 3) {
                showMessage('Nama lengkap minimal 3 karakter.', 'error');
                fullName.focus();
                return;
            }

            if (!email.checkValidity()) {
                showMessage('Format email belum valid.', 'error');
                email.focus();
                return;
            }

            if (!phone.checkValidity()) {
                showMessage('Nomor telepon harus berisi 8-15 digit dan boleh memakai +, spasi, atau tanda hubung.', 'error');
                phone.focus();
                return;
            }

            if (password.value.length < 8) {
                showMessage('Password minimal 8 karakter.', 'error');
                password.focus();
                return;
            }

            if (password.value !== confirmPassword.value) {
                showMessage('Password dan konfirmasi password harus sama.', 'error');
                confirmPassword.focus();
                return;
            }

            if (!terms.checked) {
                showMessage('Kamu harus menyetujui syarat dan ketentuan.', 'error');
                terms.focus();
                return;
            }

            showMessage('Form berhasil divalidasi. Data siap dikirim.', 'success');
            signupForm.reset();
        });
    </script>
</body>
</html>
